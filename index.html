<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natya Kala Kendra</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

html, body {
    height: 100%;
}

body {
    color: white;
    overflow-x: hidden;
     background: url("da.jpg") no-repeat center center/cover;



/* HEADER */
header {
    background: #1a1a1a;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

header h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 34px;
}

/* NAV */
nav {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

nav a {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 6px;
    transition: 0.3s;
}

nav a:hover {
    background: #ff4b2b;
}

/* HERO */
.hero {
    position: relative;
    min-height: 80vh;
    width: 100%;
   
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* dark overlay */
.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
 
    z-index: 1;
}

.hero h2,
.hero p,
.hero a {
    position: relative;
    z-index: 2;
}

.hero h2 {
    font-size: 42px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
    margin-bottom: 20px;
    max-width: 600px;
}

/* BUTTON */
.hero a {
    padding: 12px 25px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 25px;
    font-weight: bold;
    transition: 0.3s;
}

.hero a:hover {
    background: #ff4b2b;
    color: white;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: white;
     
}

/* 📱 MOBILE */
@media (max-width: 768px) {

    header {
        flex-direction: column;
        text-align: center;
    }

    header h1 {
        font-size: 26px;
    }

    nav {
        justify-content: center;
    }

    .hero h2 {
        font-size: 26px;
    }

    .hero p {
        font-size: 14px;
    }
}

/* 💻 LARGE SCREEN */
@media (min-width: 1200px) {

    .hero h2 {
        font-size: 50px;
    }

    .hero p {
        font-size: 20px;
    }
}

</style>
</head>

<body>

<header>
    <h1>Natya Kala Kendra</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="abo.html">About</a>
        <a href="classes.html">Classes</a>
        <a href="cont.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Learn Dance with Passion & Rhythm</h2>
    <p>Join our professional Bharatanatyam, Mohiniyattam & Kuchipudi training programs</p>
    <a href="classes.html">Explore Classes</a>
</section>

<footer>
    © 2026 Natya Kala Kendra | All Rights Reserved
</footer>

</body>
</html>
